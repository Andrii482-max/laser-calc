<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Calc</title>
    <script src="https://unpkg.com/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #0f0; padding: 20px; border-radius: 15px; display: inline-block; }
        .btn { background: #0f0; color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>LASER CALCULATOR</h2>
        <label class="btn" for="dxf">ОБРАТИ DXF</label>
        <input type="file" id="dxf" accept=".dxf" style="display:none">
        <div id="res">Чекаю файл...</div>
    </div>
    <script>
        document.getElementById('dxf').onchange = function(e) {
            const r = new FileReader();
            r.onload = function(ev) {
                try {
                    const p = new DxfParser();
                    const d = p.parseSync(ev.target.result);
                    alert("Файл прочитано! Об'єктів: " + d.entities.length);
                } catch(e) { alert("Помилка DXF"); }
            };
            r.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
