<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #0f0; color: #000; padding: 20px; border-radius: 10px; font-weight: bold; text-decoration: none; }
        .info { margin-top: 20px; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>
    <h1>КАЛЬКУЛЯТОР ПРАЦЮЄ</h1>
    <p>Якщо ви бачите цей текст, то GitHub Pages налаштовано вірно.</p>
    <label class="btn" for="f">📁 ОБРАТИ ФАЙЛ</label>
    <input type="file" id="f" style="display:none">
    <div class="info">Чекаю на файл...</div>
    
    <script>
        document.getElementById('f').onchange = function() {
            alert('Файл обрано! Тепер ми знаємо, що скрипти працюють.');
        };
    </script>
</body>
</html>
