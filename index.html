<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro Calc</title>
    <script src="https://unpkg.com/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; height: 100vh; display: flex; flex-direction: column; }
        #canvas-container { flex-grow: 1; position: relative; background: radial-gradient(circle, #111 1px, transparent 1px); background-size: 30px 30px; }
        canvas { width: 100%; height: 100%; display: block; }
        .ui { background: var(--panel); padding: 15px; border-radius: 20px 20px 0 0; border-top: 1px solid #333; z-index: 10; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: #222; border: 1px solid #444; color: var(--neon); padding: 10px; border-radius: 8px; font-size: 16px; width: 80%; outline: none; }
        label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; }
        .btn-file { background: var(--neon); color: #000; padding: 12px; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; display: block; margin-bottom: 10px; }
        .stats-bar { grid-column: span 2; display: flex; justify-content: space-between; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #222; margin: 5px 0; font-size: 13px; }
        .total { font-size: 24px; color: var(--neon); text-align: center; font-weight: bold; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .tool-hint { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; color: var(--neon); }
    </style>
</head>
<body>

<div id="canvas-container">
    <div class="tool-hint">Zoom: 2 пальці | Видалити лінію: тап</div>
    <canvas id="c"></canvas>
</div>

<div class="ui">
    <label class="btn-file" for="f">📂 ЗАВАНТАЖИТИ DXF</label>
    <input type="file" id="f" accept=".dxf" style="display:none">

    <div class="grid">
        <div class="field">
            <label>Бажана ВИСОТА (мм)</label>
            <input type="number" id="th" placeholder="Авто">
        </div>
        <div class="field">
            <label>Мікроперетинки (шт)</label>
            <input type="number" id="mt" value="0">
        </div>
        <div class="stats-bar">
            <div>Ш: <span id="out-w">-</span></div>
            <div>Різ: <span id="out-l">0</span> м</div>
            <div>Врізки: <span id="out-p">0</span></div>
        </div>
        <div class="field">
            <label>Ціна м/п</label>
            <input type="number" id="pm" value="25">
        </div>
        <div class="field">
            <label>Ціна врізки</label>
            <input type="number" id="pp" value="2">
        </div>
    </div>
    <div class="total"><span id="res">0</span> грн</div>
</div>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let entities = [], stats = { l: 0, w: 0, h: 0, minX: 0, minY: 0 };
    let cam = { x: 0, y: 0, z: 1 }, lastT = [];

    // Завантаження збережених цін
    ['pm', 'pp'].forEach(id => {
        const s = localStorage.getItem(id);
        if(s) document.getElementById(id).value = s;
    });

    document.getElementById('f').onchange = e => {
        const r = new FileReader();
        r.onload = ev => {
            const p = new DxfParser();
            try {
                const dxf = p.parseSync(ev.target.result);
                entities = dxf.entities.filter(ent => ent.type === 'LINE' || ent.type === 'LWPOLYLINE');
                process();
                resetCam();
                calc();
            } catch(err) { alert("Помилка файлу"); }
        };
        r.readAsText(e.target.files[0]);
    };

    function process() {
        let l = 0, xmin = Infinity, xmax = -Infinity, ymin = Infinity, ymax = -Infinity;
        entities.forEach(e => {
            const v = e.vertices;
            for(let i=0; i<v.length-1; i++) {
                l += Math.hypot(v[i+1].x-v[i].x, v[i+1].y-v[i].y);
                [v[i], v[i+1]].forEach(p => {
                    xmin = Math.min(xmin, p.x); xmax = Math.max(xmax, p.x);
                    ymin = Math.min(ymin, p.y); ymax = Math.max(ymax, p.y);
                });
            }
        });
        stats = { l, w: xmax-xmin, h: ymax-ymin, minX: xmin, minY: ymin };
        document.getElementById('th').value = Math.round(stats.h);
    }

    function resetCam() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        cam.z = Math.min(canvas.width/stats.w, canvas.height/stats.h) * 0.7;
        cam.x = canvas.width/2 - (stats.minX + stats.w/2) * cam.z;
        cam.y = canvas.height/2 + (stats.minY + stats.h/2) * cam.z;
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(!entities.length) return;
        ctx.translate(cam.x, cam.y);
        ctx.scale(cam.z, -cam.z);
        ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 1/cam.z;
        entities.forEach(e => {
            ctx.beginPath(); ctx.moveTo(e.vertices[0].x, e.vertices[0].y);
            for(let i=1; i<e.vertices.length; i++) ctx.lineTo(e.vertices[i].x, e.vertices[i].y);
            ctx.stroke();
        });
        requestAnimationFrame(draw);
    }
    draw();

    function calc() {
        const th = parseFloat(document.getElementById('th').value) || stats.h;
        const s = th / stats.h;
        const curL = ((stats.l * s) / 1000).toFixed(2);
        const mt = parseInt(document.getElementById('mt').value) || 0;
        const p = entities.length + mt;
        const vM = parseFloat(document.getElementById('pm').value);
        const vP = parseFloat(document.getElementById('pp').value);
        
        localStorage.setItem('pm', vM); localStorage.setItem('pp', vP);
        
        document.getElementById('out-w').innerText = Math.round(stats.w * s) + 'мм';
        document.getElementById('out-l').innerText = curL;
        document.getElementById('out-p').innerText = p;
        document.getElementById('res').innerText = Math.round(curL * vM + p * vP);
    }

    // Керування (Zoom/Pan/Delete)
    canvas.addEventListener('touchstart', e => { 
        lastT = Array.from(e.touches);
        if(e.touches.length === 1) { // Функція видалення (ластик)
            const rect = canvas.getBoundingClientRect();
            const tx = (e.touches[0].clientX - rect.left - cam.x) / cam.z;
            const ty = (e.touches[0].clientY - rect.top - cam.y) / -cam.z;
            entities = entities.filter(ent => {
                const v = ent.vertices[0], v2 = ent.vertices[1];
                const d = Math.abs((v2.y-v.y)*tx - (v2.x-v.x)*ty + v2.x*v.y - v2.y*v.x) / Math.hypot(v2.y-v.y, v2.x-v.x);
                return d > 5/cam.z; // Видаляємо якщо тап близько до лінії
            });
            process(); calc();
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = Array.from(e.touches);
        if(t.length === 2 && lastT.length === 2) {
            const d1 = Math.hypot(lastT[0].pageX-lastT[1].pageX, lastT[0].pageY-lastT[1].pageY);
            const d2 = Math.hypot(t[0].pageX-t[1].pageX, t[0].pageY-t[1].pageY);
            const f = d2/d1; cam.z *= f;
            const mx = (t[0].pageX+t[1].pageX)/2, my = (t[0].pageY+t[1].pageY)/2;
            cam.x = mx - (mx - cam.x) * f; cam.y = my - (my - cam.y) * f;
        } else if(t.length === 1 && lastT.length === 1) {
            cam.x += t[0].pageX - lastT[0].pageX; cam.y += t[0].pageY - lastT[0].pageY;
        }
        lastT = t;
    });

    ['th', 'mt', 'pm', 'pp'].forEach(id => document.getElementById(id).oninput = calc);
</script>
</body>
</html>
